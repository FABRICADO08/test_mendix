name: Build and Commit MDA

on:
  push:
    branches: [ "main", "develop" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mda:
    runs-on: windows-latest

    env:
      # We use the major.minor version for the tool discovery
      MENDIX_VERSION: "10.24.1"
      MDA_OUTPUT: deployment/app.mda

    steps:
      - name: 1. Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 3. Locate Mendix MxBuild
        id: install_mx
        shell: pwsh
        run: |
          # Since the CDN URL failed, we will look for mxbuild in the local environment
          # or use a more reliable fallback URL. 
          # For Mendix 10.24.1, we'll try the direct download link from the Marketplace/Support logic
          
          $version = "10.24.1.41163"
          $url = "https://cdn.mendix.com/runtime/mendix-$version.tar.gz"
          
          Write-Host "Attempting download from Mendix CDN..."
          try {
              Invoke-WebRequest -Uri $url -OutFile "mendix_runtime.tar.gz" -ErrorAction Stop
          } catch {
              Write-Host "CDN Download failed. Falling back to Mendix Build Tools search..."
              # If the CDN fails, we assume you might be running on a runner that needs 
              # the tools pre-installed or we need to point to the build-server tools.
              throw "Could not download Mendix $version. Please verify the build number '41163' in Studio Pro > Help > About."
          }
          
          mkdir mx_tools
          tar -xzf mendix_runtime.tar.gz -C mx_tools
          $mxbin = Get-ChildItem -Path "mx_tools" -Filter "mxbuild.exe" -Recurse | Select-Object -First 1 -ExpandProperty FullName
          "MXBUILD_BIN=$mxbin" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: 4. Locate Project File
        id: find_mpr
        shell: pwsh
        run: |
          $mpr = Get-ChildItem -Path . -Recurse -Filter *.mpr | Select-Object -First 1 -ExpandProperty FullName
          if (-not $mpr) { throw "No .mpr file found!" }
          "mpr=$mpr" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: 5. Build MDA
        shell: pwsh
        run: |
          $mx = "${{ steps.install_mx.outputs.MXBUILD_BIN }}"
          $mpr = "${{ steps.find_mpr.outputs.mpr }}"
          $out = Join-Path $env:GITHUB_WORKSPACE $env:MDA_OUTPUT
          
          $dir = [System.IO.Path]::GetDirectoryName($out)
          if (-not (Test-Path $dir)) { New-Item -ItemType Directory -Path $dir }

          # Execute Build
          & "$mx" --target=package --java-home="$env:JAVA_HOME" --output="$out" "$mpr"

      - name: 6. Commit and Push
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if (Test-Path $env:MDA_OUTPUT) {
            git add $env:MDA_OUTPUT
            git diff --cached --quiet || (git commit -m "CI: Auto-build MDA" && git push)
          } else {
            Write-Error "MDA file was not created. Build failed."
            exit 1
          }
