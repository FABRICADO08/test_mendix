name: Build MDA Automatically

on:
  push:
    branches: [ "main", "develop" ]

permissions:
  contents: write

jobs:
  build-mda:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build MDA using Mendix Docker Buildpack
        run: |
          docker pull mendix/docker-mendix-buildpack:latest
          docker run --rm \
            -v $PWD:/project \
            mendix/docker-mendix-buildpack:latest \
            /opt/mendix/buildpack/compilation /project /tmp/buildcache /tmp/deps 0

          # Copy out the generated .mda (Mendix build output)
          mkdir -p deployment
          cp -r /project/build/mendix/app.mda deployment/app.mda || true

      - name: Commit updated MDA
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add deployment/app.mda
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update MDA"
            git push
          else
            echo "No changes to commit."
          fi
