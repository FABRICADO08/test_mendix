name: Build and Commit MDA

on:
  push:
    branches: [ "main", "develop" ]

permissions:
  contents: write

jobs:
  mda:
    runs-on: windows-latest

    env:
      # Specific version for your project
      MENDIX_VERSION: "10.24.1.41163" 
      MDA_OUTPUT: deployment/app.mda

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Download Mendix Build Tools
        id: install_mx
        shell: pwsh
        run: |
          $url = "https://cdn.mendix.com/runtime/mxbuild-$($env:MENDIX_VERSION).tar.gz"
          Write-Host "Downloading MxBuild from $url"
          Invoke-WebRequest -Uri $url -OutFile "mxbuild.tar.gz"
          
          mkdir mxbuild_tools
          # Use tar to extract the tools
          tar -xzf mxbuild.tar.gz -C mxbuild_tools
          
          $mxbin = Resolve-Path "mxbuild_tools\modeler\mxbuild.exe"
          echo "MXBUILD_BIN=$mxbin" >> $env:GITHUB_OUTPUT

      - name: Locate Project File
        id: find_mpr
        shell: pwsh
        run: |
          $mpr = Get-ChildItem -Path . -Recurse -Filter *.mpr | Select-Object -First 1 -ExpandProperty FullName
          if (-not $mpr) { throw "No .mpr file found." }
          echo "mpr=$mpr" >> $env:GITHUB_OUTPUT

      - name: Build MDA
        shell: pwsh
        run: |
          $mx = "${{ steps.install_mx.outputs.MXBUILD_BIN }}"
          $mpr = "${{ steps.find_mpr.outputs.mpr }}"
          $java = $env:JAVA_HOME
          $out = Join-Path $env:GITHUB_WORKSPACE $env:MDA_OUTPUT
          
          # Create directory if missing
          $dir = [System.IO.Path]::GetDirectoryName($out)
          if (-not (Test-Path $dir)) { New-Item -ItemType Directory -Path $dir }

          # Run MxBuild explicitly pointing to the Java 21 Home
          & "$mx" --target=package --java-home="$java" --output="$out" "$mpr"

      - name: Commit & Push
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add $env:MDA_OUTPUT
          git diff --cached --quiet || (git commit -m "CI: auto-update MDA" && git push)
