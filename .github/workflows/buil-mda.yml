name: Build and Commit MDA

on:
  push:
    branches: [ "main", "develop" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mda:
    runs-on: windows-latest

    env:
      # We use the version to pull the correct Docker image
      MENDIX_VERSION: "10.24.1"
      MDA_OUTPUT: deployment/app.mda

    steps:
      - name: 1. Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 3. Extract MxBuild from Docker
        id: install_mx
        shell: pwsh
        run: |
          $image = "mendix/mendix-buildpack:v10.24.1"
          Write-Host "Pulling Mendix Build Image: $image"
          
          # Pull the image and copy the build tools out to the runner
          docker pull $image
          docker create --name mx_container $image
          mkdir mx_tools
          docker cp mx_container:/opt/mendix/build mx_tools/
          docker rm mx_container
          
          # Find the executable
          $mxbin = Get-ChildItem -Path "mx_tools" -Filter "mxbuild.exe" -Recurse | Select-Object -First 1 -ExpandProperty FullName
          if (-not $mxbin) { 
            # Fallback for Linux-based containers: search for the 'mxbuild' shell script/binary
            $mxbin = Get-ChildItem -Path "mx_tools" -Filter "mxbuild" -Recurse | Select-Object -First 1 -ExpandProperty FullName
          }
          
          Write-Host "Found MxBuild at: $mxbin"
          "MXBUILD_BIN=$mxbin" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: 4. Locate Project File
        id: find_mpr
        shell: pwsh
        run: |
          $mpr = Get-ChildItem -Path . -Recurse -Filter *.mpr | Select-Object -First 1 -ExpandProperty FullName
          if (-not $mpr) { throw "No .mpr file found!" }
          "mpr=$mpr" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: 5. Build MDA
        shell: pwsh
        run: |
          $mx = "${{ steps.install_mx.outputs.MXBUILD_BIN }}"
          $mpr = "${{ steps.find_mpr.outputs.mpr }}"
          $out = Join-Path $env:GITHUB_WORKSPACE $env:MDA_OUTPUT
          
          # Create folder if missing
          $dir = [System.IO.Path]::GetDirectoryName($out)
          if (-not (Test-Path $dir)) { New-Item -ItemType Directory -Path $dir -Force }

          Write-Host "Starting build with Java 21..."
          & "$mx" --target=package --java-home="$env:JAVA_HOME" --output="$out" "$mpr"

      - name: 6. Commit and Push
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if (Test-Path $env:MDA_OUTPUT) {
            git add $env:MDA_OUTPUT
            git diff --cached --quiet || (git commit -m "CI: Auto-build MDA version ${{ env:MENDIX_VERSION }}" && git push)
          } else {
            Write-Error "Build failed: MDA file was not generated."
            exit 1
          }
