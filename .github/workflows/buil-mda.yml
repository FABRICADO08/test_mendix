name: Build and Commit MDA

on:
  push:
    branches: [ "main", "develop" ]
  workflow_dispatch: # This allows you to run it manually to test

permissions:
  contents: write

jobs:
  mda:
    runs-on: windows-latest

    env:
      MENDIX_VERSION: "10.24.1.41163" 
      MDA_OUTPUT: deployment/app.mda

    steps:
      - name: 1. Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 3. Download Mendix Runtime
        id: install_mx
        shell: pwsh
        run: |
          $url = "https://cdn.mendix.com/runtime/mendix-$($env:MENDIX_VERSION).tar.gz"
          Write-Host "Downloading from: $url"
          
          # Use a simpler download method to avoid proxy/stream issues
          $client = New-Object System.Net.WebClient
          $client.DownloadFile($url, "mendix_runtime.tar.gz")
          
          mkdir mx_tools
          tar -xzf mendix_runtime.tar.gz -C mx_tools
          
          $mxbin = Get-ChildItem -Path "mx_tools" -Filter "mxbuild.exe" -Recurse | Select-Object -First 1 -ExpandProperty FullName
          if (-not $mxbin) { throw "mxbuild.exe not found!" }
          
          Write-Host "Found MxBuild at: $mxbin"
          "MXBUILD_BIN=$mxbin" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: 4. Locate Project File
        id: find_mpr
        shell: pwsh
        run: |
          $mpr = Get-ChildItem -Path . -Recurse -Filter *.mpr | Select-Object -First 1 -ExpandProperty FullName
          if (-not $mpr) { throw "No .mpr file found!" }
          "mpr=$mpr" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: 5. Build MDA
        shell: pwsh
        run: |
          $mx = "${{ steps.install_mx.outputs.MXBUILD_BIN }}"
          $mpr = "${{ steps.find_mpr.outputs.mpr }}"
          $out = Join-Path $env:GITHUB_WORKSPACE $env:MDA_OUTPUT
          
          # Create folder if missing
          $dir = [System.IO.Path]::GetDirectoryName($out)
          if (-not (Test-Path $dir)) { New-Item -ItemType Directory -Path $dir }

          & "$mx" --target=package --java-home="$env:JAVA_HOME" --output="$out" "$mpr"

      - name: 6. Commit and Push
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add $env:MDA_OUTPUT
          git diff --cached --quiet || (git commit -m "CI: Auto-build MDA" && git push)
