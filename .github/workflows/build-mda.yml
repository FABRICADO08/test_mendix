name: Build and Commit MDA

on:
  push:
    branches: [ "main", "develop" ]
  workflow_dispatch:

permissions:
  contents: write
  packages: write  # Added to ensure you have permission to push to GHCR

jobs:
  mda:
    runs-on: ubuntu-latest
    env:
      MENDIX_VERSION: "10.24.1.74050"
      MDA_OUTPUT: deployment/app.mda

    steps:
      - name: 1. Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- NEW STEP: Prepare lowercase repository name ---
      - name: 0. Set Repository Name to Lowercase
        id: repo_name
        run: echo "LOWER_REPO=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT
      # ----------------------------------------------------

      - name: 2. Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 3. Download & Install MxBuild (Linux)
        id: install_mx
        shell: bash
        run: |
          url="https://cdn.mendix.com/runtime/mxbuild-${{ env.MENDIX_VERSION }}.tar.gz"
          curl -L -f -o mendix_runtime.tar.gz "$url" || { echo "❌ Download failed!"; exit 1; }
          mkdir -p mx_tools
          tar -xzf mendix_runtime.tar.gz -C mx_tools
          mxbin=$(find mx_tools -name mxbuild -type f | head -n 1)
          chmod +x "$mxbin"
          echo "MXBUILD_BIN=$mxbin" >> $GITHUB_OUTPUT

      - name: 4. Locate Project File
        id: find_mpr
        shell: bash
        run: |
          mpr=$(find . -name "*.mpr" -type f | head -n 1)
          echo "mpr=$mpr" >> $GITHUB_OUTPUT

      - name: 5. Build MDA
        shell: bash
        run: |
          mx="${{ steps.install_mx.outputs.MXBUILD_BIN }}"
          mpr="${{ steps.find_mpr.outputs.mpr }}"
          out="${{ github.workspace }}/${{ env.MDA_OUTPUT }}"
          mkdir -p "$(dirname "$out")"
          "$mx" --target=package --java-home="$JAVA_HOME" --output="$out" "$mpr"

      - name: 6. Commit and Push MDA
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f "${{ env.MDA_OUTPUT }}"
          if git diff --cached --quiet; then
            echo "✅ No changes to commit"
          else
            git commit -m "CI: Auto-build MDA (v${{ env.MENDIX_VERSION }})"
            git fetch origin
            git pull origin ${{ github.ref_name }} --rebase --autostash
            git push
          fi

      - name: 7. Unzip MDA for Docker build
        shell: bash
        run: |
          mkdir -p deployment/unzipped
          unzip -q "${{ env.MDA_OUTPUT }}" -d deployment/unzipped

      - name: 8. Build Docker image
        shell: bash
        run: |
          # Use the lowercase repo name from Step 0
          docker build -t ghcr.io/${{ steps.repo_name.outputs.LOWER_REPO }}:${{ github.sha }} .

      - name: 9. Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 10. Push Docker image
        run: |
          # Use the lowercase repo name from Step 0
          REPO_URL="ghcr.io/${{ steps.repo_name.outputs.LOWER_REPO }}"
          docker push $REPO_URL:${{ github.sha }}
          docker tag $REPO_URL:${{ github.sha }} $REPO_URL:latest
          docker push $REPO_URL:latest
          echo "✅ Docker image pushed to GHCR!"
