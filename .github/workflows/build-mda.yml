name: Build and Commit MDA

on:
  push:
    branches: [ "main", "develop" ]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  mda:
    runs-on: ubuntu-latest
    env:
      MENDIX_VERSION: "10.24.1.74050"
      MDA_OUTPUT: deployment/app.mda

    steps:
      - name: 1. Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 3. Download & Install MxBuild (Linux)
        id: install_mx
        shell: bash
        run: |
          url="https://cdn.mendix.com/runtime/mxbuild-${{ env.MENDIX_VERSION }}.tar.gz"
          echo "Downloading MxBuild from: $url"

          curl -L -f -o mendix_runtime.tar.gz "$url" || { echo "❌ Download failed!"; exit 1; }

          mkdir -p mx_tools
          tar -xzf mendix_runtime.tar.gz -C mx_tools

          mxbin=$(find mx_tools -name mxbuild -type f | head -n 1)
          if [ -z "$mxbin" ]; then
            echo "❌ mxbuild binary not found!"
            exit 1
          fi

          chmod +x "$mxbin"
          echo "MXBUILD_BIN=$mxbin" >> $GITHUB_OUTPUT
          echo "✅ Found MxBuild at: $mxbin"

      - name: 4. Locate Project File
        id: find_mpr
        shell: bash
        run: |
          mpr=$(find . -name "*.mpr" -type f | head -n 1)
          if [ -z "$mpr" ]; then
            echo "❌ No .mpr file found!"
            exit 1
          fi
          echo "mpr=$mpr" >> $GITHUB_OUTPUT
          echo "✅ Found project: $mpr"

      - name: 5. Build MDA
        shell: bash
        run: |
          mx="${{ steps.install_mx.outputs.MXBUILD_BIN }}"
          mpr="${{ steps.find_mpr.outputs.mpr }}"
          out="${{ github.workspace }}/${{ env.MDA_OUTPUT }}"

          mkdir -p "$(dirname "$out")"

          echo "🔧 Using JAVA_HOME : $JAVA_HOME"
          echo "🔧 Java executable: $JAVA_HOME/bin/java"

          "$mx" --target=package \
              --java-home="$JAVA_HOME" \
              --java-exe-path="$JAVA_HOME/bin/java" \
              --output="$out" \
              "$mpr"

      - name: 6. Commit and Push MDA
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -f "${{ env.MDA_OUTPUT }}"

          if git diff --cached --quiet; then
            echo "✅ No changes to commit"
          else
            git commit -m "CI: Auto-build MDA (v${{ env.MENDIX_VERSION }})"
            git fetch origin
            git pull origin ${{ github.ref_name }} --rebase --autostash
            git push
            echo "✅ MDA committed and pushed successfully!"
          fi

      - name: 7. Unzip MDA for Docker build
        shell: bash
        run: |
          mkdir -p deployment/unzipped
          unzip -q "${{ env.MDA_OUTPUT }}" -d deployment/unzipped
          echo "✅ MDA unzipped to deployment/unzipped"

      - name: 8. Build Docker image
        id: build_image
        shell: bash
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          image="ghcr.io/$owner/test_mendix:${{ github.sha }}"

          docker build -t "$image" .
          echo "image=$image" >> $GITHUB_OUTPUT

          echo "Built image: $image"
          echo "✅ Docker image built successfully!"

      - name: 9. Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 10. Push Docker image
        shell: bash
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          image_sha="ghcr.io/$owner/test_mendix:${{ github.sha }}"
          image_latest="ghcr.io/$owner/test_mendix:latest"

          docker push "$image_sha"
          docker tag "$image_sha" "$image_latest"
          docker push "$image_latest"

          echo "Pushed:"
          echo " - $image_sha"
          echo " - $image_latest"
          echo "✅ Docker image pushed to GHCR!"
